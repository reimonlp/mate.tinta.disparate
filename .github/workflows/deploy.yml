name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Executing remote SSH commands to deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # Si usás un puerto SSH distinto al 22, podés definir el secreto VPS_PORT. Si no, usa 22 por defecto.
          port: ${{ secrets.VPS_PORT || '22' }}
          script: |
            # Navegar a la carpeta del proyecto
            cd ${{ secrets.VPS_PROJECT_PATH }}
            
            # Descargar los últimos cambios
            git pull origin main
            
            # Reconstruir la imagen de Docker con los nuevos cambios
            docker compose build
            
            # Levantar el contenedor en segundo plano (recrea si es necesario)
            docker compose up -d
            
            # Limpiar imágenes viejas que quedaron sin uso para no llenar el disco del servidor
            docker image prune -f
