<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mate, Tinta y Disparate - Panfleto A6</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
    /* Reset básico */
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    /* Contenedor principal ajustado a A6 (1/4 de hoja A4) */
    .a6-flyer {
        width: 105mm;
        height: 148mm;
        background-color: #ffffff;
        color: #000000; /* Estricto Blanco y Negro para impresión */
        font-family: 'DM Sans', sans-serif;
        padding: 8mm; /* Margen interno para que no se corte al imprimir */
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        border: 1px dashed #cccccc; /* Línea guía para recortar (opcional) */
    }

    /* SECCIÓN SUPERIOR: Volanta y Título */
    .header-section {
        text-align: center;
    }
    .volanta {
        font-size: 9px;
        text-transform: uppercase;
        font-weight: 600;
        letter-spacing: 0.5px;
        margin-bottom: 5px;
    }
    .titulo {
        font-family: 'Playfair Display', serif;
        font-size: 34px;
        font-weight: 900;
        line-height: 0.95;
        text-transform: uppercase;
        /* Ajuste para que ocupe buen espacio sin romperse */
        word-wrap: break-word; 
    }
    .titulo em {
        font-style: italic;
        text-transform: none; /* La itálica suele quedar mejor en minúscula o normal */
    }

    /* SECCIÓN CENTRAL: Textos dinámicos */
    .middle-section {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin: 20px 0;
    }
    .frase-container {
        display: flex;
        align-items: center;
    }
    .frase {
        font-family: 'Playfair Display', serif;
        font-size: 20px;
        font-weight: 800;
        padding: 6px 12px;
        border-radius: 2px;
    }
    .linea-1 { justify-content: flex-start; }
    .linea-1 .frase { background-color: #000; color: #fff; transform: rotate(-1deg); }
    
    .linea-2 { justify-content: center; }
    .linea-2 .frase { border: 2px solid #000; color: #000; transform: rotate(1deg); }
    
    .linea-3 { justify-content: flex-end; }
    .linea-3 .frase { background-color: #000; color: #fff; transform: rotate(-0.5deg); }

    /* SECCIÓN INFERIOR: Info, Instagram y QR */
    .footer-section {
        display: flex;
        justify-content: space-between;
        align-items: stretch;
        border-top: 3px solid #000;
        padding-top: 10px;
    }
    .info-container {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        width: 65%;
    }
    .info-text {
        font-size: 13px; /* Aumentado de 10px */
        line-height: 1.4;
    }
    .info-text .subtitulo {
        font-weight: 900;
        font-size: 15px; /* Aumentado de 11px */
        margin-bottom: 6px;
        display: block;
        font-family: 'Playfair Display', serif;
        text-transform: uppercase;
        letter-spacing: 1px;
    }
    .info-text p {
        margin-bottom: 8px;
    }
    .handler-ig {
        font-weight: 800;
        font-size: 14px;
        margin-top: 10px;
    }
    .qr-container {
        width: 30%;
        display: flex;
        justify-content: flex-end;
        align-items: flex-end;
    }
    .qr-container img {
        width: 100%;
        max-width: 32mm;
        height: auto;
        object-fit: contain;
    }
</style>
</head>
<body>

    <div class="a6-flyer">
        
        <!-- ENCABEZADO -->
        <div class="header-section">
            <div class="volanta">Club de Lectura y Escritura Creativa para TODAS las Edades</div>
            <h1 class="titulo">Mate, Tinta<br>y <em>Disparate</em></h1>
        </div>

        <!-- TEXTOS DE LLAMADA A LA ACCIÓN -->
        <div class="middle-section">
            <div class="frase-container linea-1"><span class="frase">VENÍ A PROBAR</span></div>
            <div class="frase-container linea-2"><span class="frase">VENÍ A INVENTAR</span></div>
            <div class="frase-container linea-3"><span class="frase">VENÍ A DESORDENAR</span></div>
        </div>

        <!-- PIE DE PÁGINA -->
        <div class="footer-section">
            <div class="info-container">
                <div class="info-text">
                    <span class="subtitulo">CUÁNDO Y DÓNDE</span>
                    <p><strong>Sábados</strong> 15:30 a 17:30<br>C.C. El Clú de Berisso</p>
                    <p><strong>Domingos</strong> 15:30 a 17:30<br>C.C. Olga Vázquez</p>
                    <p><i>Actividad Arancelada</i></p>
                </div>
                <div class="handler-ig">
                    @mate.tinta.disparate
                </div>
            </div>
            
            <div class="qr-container">
                <!-- Se usa una API gratuita que genera el QR apuntando directo a tu Instagram -->
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https://instagram.com/mate.tinta.disparate&margin=0" alt="Código QR de Instagram">
            </div>
        </div>

    </div>

    <!-- SCRIPT DE DESARROLLO: Recarga automática al detectar cambios (funciona con servidor local) -->
    <script>
        (function() {
            let lastModified = null;
            async function checkChanges() {
                try {
                    const response = await fetch(window.location.href, { method: 'HEAD', cache: 'no-cache' });
                    const currentModified = response.headers.get('Last-Modified');
                    if (lastModified && lastModified !== currentModified) {
                        location.reload();
                    }
                    lastModified = currentModified;
                } catch (e) {
                    // Silenciar errores si el servidor no soporta HEAD o no hay conexión
                }
                setTimeout(checkChanges, 1000);
            }
            checkChanges();
        })();
    </script>
</body>
</html>
