<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mate, Tinta y Disparate - Panfleto A6</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
    /* Reset básico */
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    /* Contenedor principal ajustado a A6 (1/4 de hoja A4) */
    .a6-flyer {
        width: 105mm;
        height: 148mm;
        background-color: #ffffff;
        color: #000000; /* Estricto Blanco y Negro para impresión */
        font-family: 'DM Sans', sans-serif;
        padding: 8mm; /* Margen interno para que no se corte al imprimir */
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        border: 1px dashed #cccccc; /* Línea guía para recortar (opcional) */
        position: relative; /* Para las decoraciones */
        overflow: hidden;
    }

    /* DECORACIONES PARATEXTUALES */
    .decoracion {
        position: absolute;
        z-index: 0;
        opacity: 0.1; /* Muy sutil */
        pointer-events: none;
    }
    .decor-mate { width: 30mm; top: 105mm; left: -5mm; transform: rotate(-15deg); }
    .decor-libros { width: 35mm; top: 55mm; right: -10mm; transform: rotate(10deg); }
    .decor-mancha { width: 40mm; top: -10mm; left: -15mm; }
    .decor-garabato { width: 25mm; bottom: 45mm; right: 5mm; }

    /* SECCIÓN SUPERIOR: Volanta y Título */
    .header-section {
        text-align: center;
        position: relative;
        z-index: 1;
    }
    .logo-flyer {
        width: 20mm;
        height: 20mm;
        margin: 0 auto 10px;
        overflow: hidden;
    }
    .logo-flyer img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: grayscale(1) contrast(200%) brightness(1.2); /* Efecto sello */
    }
    .volanta {
        font-size: 9px;
        text-transform: uppercase;
        font-weight: 600;
        letter-spacing: 0.5px;
        margin-bottom: 5px;
    }
    .titulo {
        font-family: 'Playfair Display', serif;
        font-size: 30px;
        font-weight: 900;
        line-height: 0.95;
        text-transform: uppercase;
        /* Ajuste para que ocupe buen espacio sin romperse */
        word-wrap: break-word; 
    }
    .titulo em {
        font-style: italic;
        text-transform: none; /* La itálica suele quedar mejor en minúscula o normal */
    }

    /* SECCIÓN CENTRAL: Textos dinámicos */
    .middle-section {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin: 20px 0;
        position: relative;
        z-index: 1;
    }
    .frase-container {
        display: flex;
        align-items: center;
    }
    .frase {
        font-family: 'Playfair Display', serif;
        font-size: 20px;
        font-weight: 800;
        padding: 6px 12px;
        border-radius: 2px;
    }
    .linea-1 { justify-content: flex-start; }
    .linea-1 .frase { background-color: #000; color: #fff; transform: rotate(-1deg); }
    
    .linea-2 { justify-content: center; }
    .linea-2 .frase { border: 2px solid #000; color: #000; transform: rotate(1deg); }
    
    .linea-3 { justify-content: flex-end; }
    .linea-3 .frase { background-color: #000; color: #fff; transform: rotate(-0.5deg); }

    /* SECCIÓN INFERIOR: Info, Instagram y QR */
    .footer-section {
        display: flex;
        justify-content: space-between;
        align-items: stretch;
        border-top: 3px solid #000;
        padding-top: 10px;
        position: relative;
        z-index: 1;
    }
    .info-container {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        width: 65%;
    }
    .info-text {
        font-size: 13px; /* Aumentado de 10px */
        line-height: 1.4;
    }
    .info-text .subtitulo {
        font-weight: 900;
        font-size: 15px; /* Aumentado de 11px */
        margin-bottom: 6px;
        display: block;
        font-family: 'Playfair Display', serif;
        text-transform: uppercase;
        letter-spacing: 1px;
    }
    .info-text p {
        margin-bottom: 8px;
    }
    .handler-ig {
        font-weight: 800;
        font-size: 14px;
        margin-top: 10px;
    }
    .qr-container {
        width: 30%;
        display: flex;
        justify-content: flex-end;
        align-items: flex-end;
    }
    .qr-container img {
        width: 100%;
        max-width: 32mm;
        height: auto;
        object-fit: contain;
    }
</style>
</head>
<body>

    <div class="a6-flyer">

        <!-- DECORACIONES SVG -->
        <div class="decoracion decor-mancha">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <path d="M20,50 Q10,20 40,30 T70,50 T40,80 Z" fill="black" />
            </svg>
        </div>
        <div class="decoracion decor-mate">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <path d="M35 60 Q 35 85 50 85 Q 65 85 65 60 Q 65 45 50 45 Q 35 45 35 60" fill="none" stroke="black" stroke-width="3"/>
                <path d="M55 45 L 65 15" stroke="black" stroke-width="3" stroke-linecap="round"/>
            </svg>
        </div>
        <div class="decoracion decor-libros">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <rect x="20" y="30" width="35" height="45" fill="none" stroke="black" stroke-width="3" transform="rotate(-10 37 52)"/>
                <rect x="45" y="25" width="35" height="45" fill="none" stroke="black" stroke-width="3" transform="rotate(5 62 47)"/>
            </svg>
        </div>
        <div class="decoracion decor-garabato">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <path d="M10,10 C20,40 40,0 50,30 S80,60 90,40" fill="none" stroke="black" stroke-width="2" stroke-dasharray="4 2"/>
            </svg>
        </div>
        
        <!-- ENCABEZADO -->
        <div class="header-section">
            <div class="logo-flyer">
                <img src="logo.jpeg" alt="Logo">
            </div>
            <div class="volanta">Club de Lectura y Escritura Creativa para TODAS las Edades</div>
            <h1 class="titulo">Mate, Tinta<br>y <em>Disparate</em></h1>
        </div>

        <!-- TEXTOS DE LLAMADA A LA ACCIÓN -->
        <div class="middle-section">
            <div class="frase-container linea-1"><span class="frase">VENÍ A PROBAR</span></div>
            <div class="frase-container linea-2"><span class="frase">VENÍ A INVENTAR</span></div>
            <div class="frase-container linea-3"><span class="frase">VENÍ A DESORDENAR</span></div>
        </div>

        <!-- PIE DE PÁGINA -->
        <div class="footer-section">
            <div class="info-container">
                <div class="info-text">
                    <span class="subtitulo">CUÁNDO Y DÓNDE</span>
                    <p><strong>Sábados</strong> 15:30 a 17:30<br>C.C. El Clú de Berisso</p>
                    <p><strong>Domingos</strong> 15:30 a 17:30<br>C.C. Olga Vázquez</p>
                    <p><i>Actividad Arancelada</i></p>
                </div>
                <div class="handler-ig">
                    @mate.tinta.disparate
                </div>
            </div>
            
            <div class="qr-container">
                <!-- Se usa una API gratuita que genera el QR apuntando directo a tu Instagram -->
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https://instagram.com/mate.tinta.disparate&margin=0" alt="Código QR de Instagram">
            </div>
        </div>

    </div>

    <!-- SCRIPT DE DESARROLLO: Recarga automática al detectar cambios (funciona con servidor local) -->
    <script>
        (function() {
            let lastModified = null;
            async function checkChanges() {
                try {
                    const response = await fetch(window.location.href, { method: 'HEAD', cache: 'no-cache' });
                    const currentModified = response.headers.get('Last-Modified');
                    if (lastModified && lastModified !== currentModified) {
                        location.reload();
                    }
                    lastModified = currentModified;
                } catch (e) {
                    // Silenciar errores si el servidor no soporta HEAD o no hay conexión
                }
                setTimeout(checkChanges, 1000);
            }
            checkChanges();
        })();
    </script>
</body>
</html>
