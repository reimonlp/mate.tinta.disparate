server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Compresión gzip para mejorar tiempos de carga
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml+rss text/javascript image/svg+xml;
    gzip_proxied any;
    gzip_comp_level 6;

    # Regla principal para Astro (SPA/Multipágina estática)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Caché optimizada para assets estáticos (imágenes, CSS, JS, fuentes)
    location ~* \.(?:ico|css|js|gif|jpe?g|png|webp|woff2?|eot|otf|ttf|svg|mp4|webm)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15552000, immutable";
    }

    # Ocultar errores de archivos ocultos (.git, .env, etc)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
